<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Encuentra tu mejor estilo automaticamente</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: black;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }

        img {
            width: 100%;
            margin-top: 15px;
            border-radius: 10px;
        }

        .resultado {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>👕 Recomendador de Ropa</h1>

    <form method="POST" action="/recomendar">

        <select name="color" required>
            <option value="">Color</option>
            <option>Negro</option>
            <option>Blanco</option>
            <option>Azul</option>
        </select>

        <select name="estilo" required>
            <option value="">Estilo</option>
            <option>Casual</option>
            <option>Formal</option>
            <option>Deportivo</option>
        </select>

        <select name="genero" required>
            <option value="">Género</option>
            <option>Hombre</option>
            <option>Mujer</option>
        </select>

        <button type="submit">Recomendar</button>

    </form>

    {% if prenda %}

    <div class="resultado">
        <h3>{{ prenda }}</h3>
        <img src="{{ url_for('static', filename=imagen) }}">
    </div>

    {% endif %}

</div>

</body>
</html>
