<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recomendador de Ropa</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h1 class="text-center mb-4">
                Sistema Inteligente de Recomendación de Ropa
            </h1>

            <div class="text-center">

                <img src="{{ url_for('static', filename='ropa.jpg') }}"
                     class="img-fluid rounded"
                     width="300">

            </div>

            <form method="POST" action="/recomendar" class="mt-4">

                <div class="mb-3">

                    <label class="form-label">
                        Color
                    </label>

                    <select name="color" class="form-select">

                        <option value="Negro" {% if color == "Negro" %}selected{% endif %}>Negro</option>
                        <option value="Blanco" {% if color == "Blanco" %}selected{% endif %}>Blanco</option>
                        <option value="Azul" {% if color == "Azul" %}selected{% endif %}>Azul</option>

                    </select>

                </div>

                <div class="mb-3">

    <label class="form-label">
        Género
    </label>

    <select name="genero" class="form-select">

        <option value="Hombre" {% if genero == "Hombre" %}selected{% endif %}>Hombre</option>
        <option value="Mujer" {% if genero == "Mujer" %}selected{% endif %}>Mujer</option>
        

    </select>

</div>

                <div class="mb-3">

                    <label class="form-label">
                        Estilo
                    </label>

                    <select name="estilo" class="form-select">

                        <option value="Casual" {% if estilo == "Casual" %}selected{% endif %}>Casual</option>
                        <option value="Formal" {% if estilo == "Formal" %}selected{% endif %}>Formal</option>
                        <option value="Deportivo" {% if estilo == "Deportivo" %}selected{% endif %}>Deportivo</option>

                    </select>

                </div>

                <div class="text-center">

                    <button class="btn btn-dark">
                        Recomendar Outfit
                    </button>

                </div>

            </form>
            {% if prenda %}

<div class="alert alert-success mt-4 text-center">

    <h4>
        Te recomendamos este outfit:
        {{ prenda }}
    </h4>

    <img src="{{ url_for('static', filename=imagen) }}"
         class="img-fluid rounded mt-3"
         width="300">

</div>

{% endif %}           
        </div>

    </div>

</body>

</html>
