<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Encuentra tu mejor estilo automáticamente</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 30px 0;
            display: flex;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            margin-bottom: 20px;
            color: #111;
        }

        select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            background: black;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
        }

        .resultado {
            margin-top: 20px;
            animation: aparecer 0.5s ease;
        }

        .resultado h3 {
            margin-bottom: 15px;
            color: #111;
        }

        img {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>

<body>

    <div class="card">

        <h1> Recomendador de Ropa</h1>

        <form method="POST" action="/recomendar">

            <select name="color" required>
                <option value="">Selecciona un color</option>
                <option>Negro</option>
                <option>Blanco</option>
                <option>Azul</option>
            </select>

            <select name="estilo" required>
                <option value="">Selecciona un estilo</option>
                <option>Casual</option>
                <option>Formal</option>
                <option>Deportivo</option>
            </select>

            <select name="genero" required>
                <option value="">Selecciona género</option>
                <option>Hombre</option>
                <option>Mujer</option>
            </select>

            <button type="submit">
                Recomendar Outfit
            </button>

        </form>

        {% if prenda %}

        <div class="resultado">

            <h3>{{ prenda }}</h3>

            <img src="{{ url_for('static', filename=imagen) }}">

        </div>

        {% endif %}

    </div>

    <script>

        const resultado = document.querySelector(".resultado");

        if(resultado){
            resultado.scrollIntoView({
                behavior: "smooth"
            });
        }

    </script>

</body>
</html>
